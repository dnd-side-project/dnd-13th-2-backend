name: Dev - CI/CD Pipeline

on:
  push:
    branches:
      - develop

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: dnd-project/app
  CONTAINER_NAME: dnd-app

jobs:
  # 1. 빌드 및 ECR 푸시
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_uri: ${{ steps.build-image.outputs.image_uri }}
      registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --output type=image,push=true \
            --cache-from type=registry,ref=$ECR_REGISTRY/$ECR_REPOSITORY:buildcache \
            --cache-to type=registry,ref=$ECR_REGISTRY/$ECR_REPOSITORY:buildcache,mode=max \
            .
          echo "image_uri=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # 2. EC2에 배포
  deploy:
    needs: build-and-push
    runs-on: self-hosted
    environment:
      name: dev

    steps:
      - name: Deploy to EC2
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
          ECR_REGISTRY: ${{ needs.build-and-push.outputs.registry }}
          HOST_PORT: 8080
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          KAMIS_API_KEY: ${{ secrets.KAMIS_API_KEY }}
          KAMIS_ID: ${{ secrets.KAMIS_ID }}
        run: |
          set -euo pipefail # 스크립트 오류 발생 시 즉시 중단

          echo "--- Starting Deployment on EC2 Runner: ${{ runner.name }} ---"

          # 1. ECR 로그인
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
          echo "✅ ECR login successful."

          # 2. 최신 이미지 pull
          docker pull $IMAGE_URI
          echo "✅ Docker image pulled successfully: $IMAGE_URI"

          # 3. 기존 컨테이너 중지 및 삭제
          if [ "$(docker ps -a -q --filter name=^/${CONTAINER_NAME}$)" ]; then
            docker stop $CONTAINER_NAME
            docker rm $CONTAINER_NAME
            echo "✅ Existing container stopped and removed."
          fi

          # 4. 새 컨테이너 실행
          docker run -d --name $CONTAINER_NAME -p $HOST_PORT:8080 --restart always \
          -e SPRING_PROFILES_ACTIVE=dev \
          -e DB_URL="$DB_URL" \
          -e DB_USERNAME="$DB_USERNAME" \
          -e DB_PASSWORD="$DB_PASSWORD" \
          -e KAMIS_API_KEY="$KAMIS_API_KEY" \
          -e KAMIS_ID="$KAMIS_ID" \
          $IMAGE_URI
          echo "✅ New container started."

          # 5. 사용하지 않는 Docker 이미지 정리
          docker image prune -af
          echo "✅ Unused docker images pruned."

          # 6. 헬스체크
          echo "Waiting for application health check..."
          sleep 15
          for i in {1..12}; do
            response=$(curl --max-time 5 -s -o /dev/null -w '%{http_code}' http://localhost:$HOST_PORT/actuator/health || true)
            if [ "$response" = "200" ]; then
              echo "🚀 Health check PASSED. Deployment successful!"
              exit 0
            fi
            echo "Health check failed with status '$response', retrying... ($i/12)"
            sleep 10
          done

          echo "❌ Health check FAILED after multiple retries."
          echo "--- Displaying container logs for debugging ---"
          docker logs --tail 100 $CONTAINER_NAME
          exit 1
