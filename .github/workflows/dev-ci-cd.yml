name: Dev - CI/CD Pipeline

on:
  push:
    branches:
      - develop

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: dnd-project/app
  EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}

jobs:
  # 1. 빌드 및 ECR 푸시
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_uri: ${{ steps.build-image.outputs.image }}
      registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # 2. EC2에 배포
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy and Health Check on EC2 instance
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
          ECR_REGISTRY: ${{ needs.build-and-push.outputs.registry }}
        run: |
          # 1. SSM Run Command를 보내고 Command ID를 변수에 저장
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploying new version ${{ env.IMAGE_URI }}" \
            --parameters 'commands=[
              "set -e",
              "# 1. ECR 로그인",
              "aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}",
              "# 2. 최신 이미지 pull",
              "docker pull ${{ env.IMAGE_URI }}",
              "# 3. 기존 컨테이너 중지 및 삭제",
              "if [ $(docker ps -a -q --filter name=dnd-app) ]; then docker stop dnd-app && docker rm dnd-app; fi",
              "# 4. 새 컨테이너 실행",
              "docker run -d --name dnd-app -p 80:8080 --restart always -e SPRING_PROFILES_ACTIVE=dev ${{ env.IMAGE_URI }}",
              "# 5. 헬스체크 스크립트",
              "echo ''Waiting for application to start...''",
              "sleep 10",
              "for i in {1..10}; do",
              "  response=$(curl -s -o /dev/null -w ''%{http_code}'' http://localhost/actuator/health)",
              "  if [ $response -eq 200 ]; then",
              "    echo ''Health check PASSED''",
              "    exit 0",
              "  else",
              "    echo ''Health check failed with status $response, retrying... ($i/12)''",
              "    sleep 5",
              "  fi",
              "done",
              "echo ''Health check FAILED after multiple retries''",
              "exit 1"
            ]' \
            --query "Command.CommandId" --output text)

          # Command ID가 제대로 받아와졌는지 확인
          if [ -z "$COMMAND_ID" ]; then
            echo "Failed to get Command ID"
            exit 1
          fi

          echo "SSM Command sent with ID: $COMMAND_ID"

          # 2. Command가 완료될 때까지 대기 (최대 5분)
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" \
            --timeout-seconds 300

          # 3. Command의 최종 실행 결과를 가져옴
          OUTPUT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.EC2_INSTANCE_ID }}" \
            --query "{Status:Status,StdOut:StandardOutputContent,StdErr:StandardErrorContent}" --output json)

          STATUS=$(echo "$OUTPUT" | jq -r .Status)
          STDOUT=$(echo "$OUTPUT" | jq -r .StdOut)
          STDERR=$(echo "$OUTPUT" | jq -r .StdErr)
          
          echo "--- EC2 Script STDOUT ---"
          echo "$STDOUT"
          echo "-------------------------"

          # 4. 결과에 따라 워크플로우 성공/실패 처리
          if [ "$STATUS" = "Success" ]; then
            echo "Deployment and health check successful!"
            exit 0
          else
            echo "Deployment or health check failed with status: $STATUS"
            echo "--- EC2 Script STDERR ---"
            echo "$STDERR"
            echo "-------------------------"
            exit 1
          fi
