name: Dev - CI/CD Pipeline

on:
  push:
    branches:
      - develop

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: dnd-project/app
  CONTAINER_NAME: dnd-app
  EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}

jobs:
  # 1. 빌드 및 ECR 푸시
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_uri: ${{ steps.build-image.outputs.image }}
      registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # 2. EC2에 배포
  deploy:
    needs: build-and-push
    runs-on: self-hosted

    steps:
      - name: Deploy and Health Check on EC2
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
          ECR_REGISTRY: ${{ needs.build-and-push.outputs.registry }}
        run: |
          set -euo pipefail

          echo "--- Starting Deployment on EC2 Runner: ${{ runner.name }} ---"

          # 1. ECR 로그인
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin $ECR_REGISTRY
          echo "ECR login successful."

          # 2. 최신 이미지 pull
          docker pull $IMAGE_URI
          echo "Docker image pulled successfully."

          # 3. 기존 컨테이너 중지 및 삭제
          if [ "$(docker ps -a -q --filter name=${{ env.CONTAINER_NAME }})" ]; then
            docker stop ${{ env.CONTAINER_NAME }}
            docker rm ${{ env.CONTAINER_NAME }}
            echo "Existing container stopped and removed."
          fi

          # 4. 새 컨테이너 실행
          docker run -d --name ${{ env.CONTAINER_NAME }} -p 80:8080 --restart always -e SPRING_PROFILES_ACTIVE=dev $IMAGE_URI
          echo "New container started."

          # 5. 헬스체크
          echo "Waiting for application health check..."
          sleep 10
          for i in $(seq 1 10); do
            response=$(curl -s -o /dev/null -w '%{http_code}' http://localhost/actuator/health || true)
            if [ "$response" = "200" ]; then
              echo "✅ Health check PASSED"
              exit 0
            fi
            echo "Health check failed with status '$response', retrying... ($i/10)"
            sleep 10
          done

          echo "❌ Health check FAILED after multiple retries"
          exit 1
