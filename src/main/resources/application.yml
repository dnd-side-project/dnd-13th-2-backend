spring:
  application:
    name: eodigo
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false

admin:
  api-key: ${ADMIN_API_KEY}

management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  server:
    port: 9000
  metrics:
    tags:
      application: ${spring.application.name}
